<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom App - Video Call</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .video-box {
            position: relative;
            background: #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
            width: 45%;
            min-width: 400px;
        }
        video {
            width: 100%;
            height: auto;
            background: #333;
        }
        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 0 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #5a67d8;
        }
        button.danger {
            background: #e53e3e;
        }
        button.danger:hover {
            background: #c53030;
        }
        button.success {
            background: #48bb78;
        }
        button.success:hover {
            background: #38a169;
        }
        .room-controls {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #2a2a2a;
            border-radius: 10px;
        }
        input {
            padding: 10px;
            margin: 0 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        .status {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 5px;
            font-size: 12px;
            font-family: monospace;
        }
        .status.connected {
            background: #276749;
            color: #fff;
        }
        .status.error {
            background: #9b2c2c;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Zoom App - Video Call</h2>
        <div class="room-controls">
            <input type="text" id="roomId" placeholder="Enter Room ID" value="test123">
            <button id="joinRoomBtn" class="success">Join Room</button>
            <button id="leaveRoomBtn" class="danger">Leave Room</button>
        </div>
        <div class="video-container">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You (Local)</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">Remote User</div>
            </div>
        </div>
        <div class="controls">
            <button id="toggleAudio">🔊 Mute Audio</button>
            <button id="toggleVideo">📹 Mute Video</button>
        </div>
        <div id="status" class="status">Not connected to any room</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let localStream = null;
        let peerConnection = null;  // Single peer connection for simplicity
        let currentRoom = null;
        let myUserId = null;
        let remoteUserId = null;
        
        let audioEnabled = true;
        let videoEnabled = true;
        
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const roomInput = document.getElementById('roomId');
        const joinBtn = document.getElementById('joinRoomBtn');
        const leaveBtn = document.getElementById('leaveRoomBtn');
        const toggleAudioBtn = document.getElementById('toggleAudio');
        const toggleVideoBtn = document.getElementById('toggleVideo');
        const statusDiv = document.getElementById('status');
        
        function updateStatus(message, type = '') {
            statusDiv.textContent = message;
            statusDiv.className = 'status';
            if (type) {
                statusDiv.classList.add(type);
            }
            console.log('Status:', message);
        }
        
        // Get local media stream
        async function getLocalStream() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: true, 
                    audio: true 
                });
                localVideo.srcObject = localStream;
                updateStatus('Camera and microphone ready', 'connected');
                return localStream;
            } catch (error) {
                console.error('Error accessing media devices:', error);
                updateStatus('Error: Cannot access camera/microphone', 'error');
                return null;
            }
        }
        
        // Create peer connection
        async function createPeerConnection() {
            if (peerConnection) {
                peerConnection.close();
            }
            
            peerConnection = new RTCPeerConnection(configuration);
            
            // Add local stream tracks
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            // Handle remote stream
            peerConnection.ontrack = (event) => {
                console.log('Received remote stream');
                remoteVideo.srcObject = event.streams[0];
                updateStatus('Connected! Video streaming', 'connected');
            };
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && remoteUserId) {
                    console.log('Sending ICE candidate');
                    socket.emit('ice-candidate', {
                        candidate: event.candidate,
                        target: remoteUserId
                    });
                }
            };
            
            // Handle connection state
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateStatus('Connected successfully!', 'connected');
                } else if (peerConnection.connectionState === 'failed') {
                    updateStatus('Connection failed', 'error');
                } else if (peerConnection.connectionState === 'disconnected') {
                    updateStatus('Disconnected', 'error');
                }
            };
            
            // Handle ICE connection state
            peerConnection.oniceconnectionstatechange = () => {
                console.log('ICE connection state:', peerConnection.iceConnectionState);
            };
        }
        
        // Create and send offer
        async function createAndSendOffer() {
            await createPeerConnection();
            
            try {
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                socket.emit('offer', {
                    offer: offer,
                    target: remoteUserId
                });
                
                console.log('Offer sent to', remoteUserId);
                updateStatus('Calling...');
            } catch (error) {
                console.error('Error creating offer:', error);
            }
        }
        
        // Socket event handlers
        socket.on('connect', () => {
            myUserId = socket.id;
            console.log('Connected to server, ID:', myUserId);
        });
        
        socket.on('room-joined', (data) => {
            currentRoom = data.roomId;
            const otherParticipants = data.participants.filter(id => id !== myUserId);
            
            if (otherParticipants.length > 0) {
                // There's someone else in the room
                remoteUserId = otherParticipants[0];
                updateStatus(`Found user in room. Connecting to ${remoteUserId.substring(0, 8)}...`);
                createAndSendOffer();
            } else {
                updateStatus(`Joined room: ${data.roomId}. Waiting for others to join...`);
            }
        });
        
        socket.on('user-joined', (data) => {
            if (data.userId === myUserId) return;
            
            // Only connect to the first person who joins
            if (!remoteUserId && !peerConnection) {
                remoteUserId = data.userId;
                updateStatus(`User joined! Connecting...`);
                createAndSendOffer();
            }
        });
        
        socket.on('user-left', (userId) => {
            if (userId === remoteUserId) {
                updateStatus('User left the room');
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                remoteUserId = null;
                remoteVideo.srcObject = null;
                updateStatus('Disconnected. Waiting for others to join...');
            }
        });
        
        socket.on('offer', async (data) => {
            if (data.from === myUserId) return;
            
            console.log('Received offer from', data.from);
            remoteUserId = data.from;
            
            await createPeerConnection();
            
            try {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                
                socket.emit('answer', {
                    answer: answer,
                    target: remoteUserId
                });
                
                console.log('Answer sent to', remoteUserId);
                updateStatus('Connecting...');
            } catch (error) {
                console.error('Error handling offer:', error);
                updateStatus('Connection error', 'error');
            }
        });
        
        socket.on('answer', async (data) => {
            if (data.from === myUserId) return;
            if (!peerConnection) return;
            
            console.log('Received answer from', data.from);
            
            // Prevent "wrong state" error - check signaling state
            if (peerConnection.signalingState === 'have-local-offer') {
                try {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                    console.log('Remote description set successfully');
                } catch (error) {
                    console.error('Error setting remote description:', error);
                }
            } else {
                console.log('Ignoring answer - wrong signaling state:', peerConnection.signalingState);
            }
        });
        
        socket.on('ice-candidate', async (data) => {
            if (data.from === myUserId) return;
            if (!peerConnection) return;
            
            try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                console.log('ICE candidate added');
            } catch (error) {
                console.error('Error adding ICE candidate:', error);
            }
        });
        
        // Join room
        function joinRoom(roomId) {
            if (currentRoom) {
                leaveRoom();
            }
            
            currentRoom = roomId;
            updateStatus(`Joining room: ${roomId}...`);
            socket.emit('join-room', roomId);
        }
        
        // Leave room
        function leaveRoom() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteUserId = null;
            remoteVideo.srcObject = null;
            
            if (currentRoom) {
                socket.emit('leave-room', currentRoom);
                currentRoom = null;
            }
            
            updateStatus('Left room');
        }
        
        // Mute controls
        toggleAudioBtn.onclick = () => {
            if (localStream) {
                audioEnabled = !audioEnabled;
                localStream.getAudioTracks()[0].enabled = audioEnabled;
                toggleAudioBtn.innerHTML = audioEnabled ? '🔊 Mute Audio' : '🔇 Unmute Audio';
                updateStatus(audioEnabled ? 'Audio unmuted' : 'Audio muted');
            }
        };
        
        toggleVideoBtn.onclick = () => {
            if (localStream) {
                videoEnabled = !videoEnabled;
                localStream.getVideoTracks()[0].enabled = videoEnabled;
                toggleVideoBtn.innerHTML = videoEnabled ? '📹 Mute Video' : '📹 Unmute Video';
                updateStatus(videoEnabled ? 'Video unmuted' : 'Video muted');
            }
        };
        
        joinBtn.onclick = () => {
            const roomId = roomInput.value.trim();
            if (!roomId) {
                alert('Please enter a room ID');
                return;
            }
            joinRoom(roomId);
        };
        
        leaveBtn.onclick = () => {
            leaveRoom();
        };
        
        // Initialize
        getLocalStream();
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (currentRoom) {
                leaveRoom();
            }
        });
    </script>
</body>
</html>
